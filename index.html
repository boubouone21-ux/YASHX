<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YASHX - Streaming Illimité</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <nav class="navbar">
      <div class="logo">YASHX</div>
      <div class="nav-links">
        <a href="#">Accueil</a>
        <a href="#">Séries</a>
        <a href="#">Films</a>
        <a href="#">Nouveautés</a>
        <a href="#">Ma Liste</a>
      </div>
      <div class="right-side">
        <i class="fas fa-search"></i>
        <i class="fas fa-bell"></i>
        <div class="profile">👤</div>
      </div>
    </nav>
  </header>

  <!-- HERO BANNER -->
  <section class="hero" style="background-image: url('https://via.placeholder.com/1920x1080?text=The+Revenge+Dhurandhar');">
    <div class="hero-content">
      <h1 class="title">THE REVENGE<br>DHURANDHAR</h1>
      <p class="subtitle">RAW & UNDEKHHA - Version Internationale Non Censurée</p>
      <p class="genres">Bollywood • Crime • Action • Aventure</p>
      <div class="buttons">
        <button class="btn play"><i class="fas fa-play"></i> Lecture</button>
        <button class="btn mylist"><i class="fas fa-plus"></i> Ma Liste</button>
      </div>
    </div>
  </section>

  <!-- CONTENU -->
  <main>
    <section class="row">
      <h2>Sports TV Shows</h2>
      <div class="carousel">
        <!-- Ajoute tes posters ici -->
        <img src="https://via.placeholder.com/300x170?text=Clash+in+Italy" alt="">
        <img src="https://via.placeholder.com/300x170?text=Brazil+70" alt="">
        <img src="https://via.placeholder.com/300x170?text=Spinning+Out" alt="">
      </div>
    </section>

    <section class="row">
      <h2>K-Dramas</h2>
      <div class="carousel">
        <img src="https://via.placeholder.com/300x170?text=The+Wonder+Foools" alt="">
        <img src="https://via.placeholder.com/300x170?text=All+Of+Us+Are+Dead" alt="">
        <img src="https://via.placeholder.com/300x170?text=Bloodhounds" alt="">
      </div>
    </section>

    <section class="row">
      <h2>Top 10 Aujourd'hui sur YASHX</h2>
      <div class="carousel">
        <!-- Tes posters -->
      </div>
    </section>

    <!-- Ajoute d'autres sections : International, Literary Sagas, etc. -->
  </main>

  <footer>
    <p>YASHX © 2026 - Clone Netflix-like • Pour démo uniquement</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>

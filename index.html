<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YASHX - Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, sans-serif; }
        .hero-bg {
            background-image: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9)), url('https://picsum.photos/id/1015/1920/1080');
            background-size: cover;
            background-position: center;
        }
        .poster:hover { transform: scale(1.08); }
        .scroll-container::-webkit-scrollbar { display: none; }
        video { width: 100%; max-height: 85vh; background: black; }
    </style>
</head>
<body class="bg-black text-white">

    <!-- Nav -->
    <nav class="fixed top-0 w-full bg-black/95 z-50 py-4">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 text-white w-9 h-9 flex items-center justify-center text-2xl font-bold rounded">Y</div>
                <span class="text-3xl font-bold">YASHX</span>
            </div>
            <input type="text" id="search" placeholder="Rechercher films, séries..." 
                   class="bg-zinc-900 px-6 py-3 w-96 rounded-full focus:outline-none">
        </div>
    </nav>

    <!-- Hero -->
    <div class="hero-bg h-screen flex items-center pt-20">
        <div class="max-w-3xl px-8">
            <h1 class="text-6xl font-bold mb-2">THE REVENGE DHURANDHAR</h1>
            <p class="text-red-500 text-xl mb-4">RAW & UNDEKHHA • UNCENSORED</p>
            <p class="text-xl mb-8">Un guerrier vengeur dans un monde en flammes.</p>
            
            <div class="flex gap-4">
                <button onclick="playMovie('dhurandhar')" 
                        class="bg-white text-black px-10 py-4 rounded font-bold flex items-center gap-3 text-lg hover:bg-gray-200">
                    <i class="fa-solid fa-play"></i> LECTURE
                </button>
                <button onclick="addToList()" class="bg-white/30 hover:bg-white/40 px-10 py-4 rounded font-bold flex items-center gap-3 text-lg">
                    <i class="fa-solid fa-plus"></i> MA LISTE
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 -mt-12 relative z-10 space-y-12 pb-20">
        <h2 class="text-2xl font-bold mb-6">🔥 Top 10 Aujourd'hui sur YASHX</h2>
        <div class="flex gap-4 overflow-x-auto scroll-container">
            <img src="https://picsum.photos/id/201/240/360" onclick="playMovie('lesson')" class="poster rounded-xl min-w-[240px] cursor-pointer" alt="Teach You a Lesson">
            <img src="https://picsum.photos/id/237/240/360" onclick="playMovie('verdict')" class="poster rounded-xl min-w-[240px] cursor-pointer" alt="">
            <img src="https://picsum.photos/id/1015/240/360" onclick="playMovie('dhurandhar')" class="poster rounded-xl min-w-[240px] cursor-pointer" alt="">
        </div>
    </div>

    <!-- VIDEO MODAL -->
    <div id="videoModal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center">
        <div class="w-full max-w-5xl mx-4">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 id="modalTitle" class="text-2xl font-bold"></h2>
                <button onclick="closeVideo()" class="text-4xl hover:text-red-500">&times;</button>
            </div>
            
            <div class="bg-black rounded-xl overflow-hidden">
                <video id="mainVideo" controls autoplay class="w-full">
                    Votre navigateur ne supporte pas la vidéo.
                </video>
            </div>
            
            <div class="text-center text-sm text-gray-400 mt-4">
                <p>YASHX - Lecteur Vidéo</p>
            </div>
        </div>
    </div>

    <script>
        const videoPlayer = document.getElementById('mainVideo');
        const modal = document.getElementById('videoModal');
        const modalTitle = document.getElementById('modalTitle');

        // Exemples de vidéos (tu peux changer les liens)
        const videos = {
            dhurandhar: {
                title: "The Revenge Dhurandhar",
                src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"  // Vidéo test gratuite
            },
            lesson: {
                title: "Teach You a Lesson",
                src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4"
            },
            verdict: {
                title: "Michael Jackson The Verdict",
                src: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4"
            }
        };

        function playMovie(key) {
            const video = videos[key];
            if (!video) {
                alert("Vidéo en cours de préparation...");
                return;
            }
            
            modalTitle.textContent = video.title;
            videoPlayer.src = video.src;
            modal.classList.remove('hidden');
            videoPlayer.play();
        }

        function closeVideo() {
            videoPlayer.pause();
            videoPlayer.src = '';
            modal.classList.add('hidden');
        }

        function addToList() {
            alert("✅ Ajouté à Ma Liste !");
        }

        // Fermer avec Echap
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeVideo();
        });

        // Recherche
        document.getElementById('search').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                alert("🔍 Recherche de : " + e.target.value + " (bientôt disponible)");
            }
        });
    </script>
</body>
</html>

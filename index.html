<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YASHX</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}
.header{color:#e50914;font-size:28px;font-weight:bold;padding:15px}
.hero{height:60vh;background:url('https://image.tmdb.org/t/p/original/8Gxv8gSFCU0XGDykEGv7zR1n2ua.jpg') center/cover;position:relative}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:100px;background:linear-gradient(transparent,#000)}
.hero-content{position:absolute;bottom:20px;left:15px}
.tag{color:#e50914;font-size:14px}
h1{font-size:40px;margin:5px 0}
.meta{font-size:14px;color:#ccc}
.stars{color:#ffa500;margin:5px 0}
.btn{padding:10px 25px;border:none;border-radius:4px;font-weight:bold;margin:10px 5px 0 0}
.btn-play{background:#fff;color:#000}
.btn-list{background:rgba(109,109,110,0.7);color:#fff}
.menu{display:flex;gap:10px;padding:15px;overflow:auto}
.menu button{background:#333;color:#fff;border:none;padding:8px 15px;border-radius:20px}
.active{background:#e50914!important}
.bottom-nav{position:fixed;bottom:0;width:100%;background:#111;display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #333}
.nav-item{text-align:center;font-size:12px;color:#666}
.nav-item.active{color:#fff}
</style>
</head>
<body>
<div class="header">YASHX</div>
<div class="hero"><div class="hero-content">
<div class="tag">N°1 EN FRANCE</div>
<h1>Oppenheimer</h1>
<div class="meta">2023 • 3h • Drame historique</div>
<div class="stars">★★★ 4.8/5</div>
<button class="btn btn-play">▶ Regarder</button>
<button class="btn btn-list">+ Ma liste</button>
</div></div>
<div class="menu">
<button class="active">Tendance</button>
<button>Films</button><button>Séries</button><button>Animés</button>
</div>
<div class="bottom-nav">
<div class="nav-item active"><div>Y</div>Accueil</div>
<div class="nav-item"><div>🔍</div>Recherche</div>
<div class="nav-item"><div>📁</div>Ma liste</div>
<div class="nav-item"><div>👤</div>Mon YASHX</div>
</div>
</body>
</html>
